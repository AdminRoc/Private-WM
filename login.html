<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>登录 — CSC·Alliance：Boss Tool</title>
  <link rel="icon" type="image/png" href="picture/websitelogo.png">
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* ══════════════════════════════
       登录页专属样式
       ══════════════════════════════ */
    body { overflow: hidden; }

    .bw-login-page {
      position: fixed; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      opacity: .95;
    }

    /* 中心放射状大光晕 */
    .bw-login-halo {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 60% 55% at 50% 50%,
        rgba(192,148,58,.13) 0%, rgba(192,148,58,.04) 45%, transparent 70%);
      animation: haloBreath 5s ease-in-out infinite;
    }
    @keyframes haloBreath {
      0%,100% { transform: scale(1);    opacity: .8; }
      50%      { transform: scale(1.08); opacity: 1; }
    }

    /* 横向扫描线背景 */
    .bw-login-scan {
      position: fixed; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent 0px, transparent 3px,
        rgba(212,168,74,.018) 3px, rgba(212,168,74,.018) 4px
      );
    }

    /* 斜向角落装饰光 */
    .bw-login-corner-glow {
      position: fixed; pointer-events: none;
      width: 300px; height: 300px; border-radius: 50%;
      background: radial-gradient(circle, rgba(192,148,58,.08) 0%, transparent 70%);
    }
    .bw-login-corner-glow.tl { top: -100px; left: -100px; }
    .bw-login-corner-glow.br { bottom: -100px; right: -100px; }

    /* ── 卡片 ── */
    .bw-login-card {
      position: relative; z-index: 1;
      width: 500px; max-width: calc(100vw - 2.4rem);
      background: linear-gradient(155deg, rgba(14,20,44,.96) 0%, rgba(7,10,22,.98) 100%);
      border: 1px solid rgba(185,142,52,.22);
      overflow: hidden;
      opacity: 0; transform: translateY(32px) scale(.97);
      animation: cardIn .72s cubic-bezier(.22,.68,0,1.12) .08s forwards;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* 顶部金线 */
    .bw-login-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(212,168,74,.7) 25%,
        #e8c86a 50%,
        rgba(212,168,74,.7) 75%,
        transparent 100%);
      box-shadow: 0 0 18px rgba(212,168,74,.5);
    }

    /* 斜向扫光 */
    .bw-login-card::after {
      content: '';
      position: absolute; top: -100%; left: -55%; width: 32%; height: 300%;
      background: linear-gradient(108deg,
        transparent 30%, rgba(212,168,74,.055) 50%, transparent 70%);
      animation: cardSweep 7s ease-in-out .6s infinite;
      pointer-events: none;
    }
    @keyframes cardSweep {
      0%   { transform: translateX(-5%);   opacity: 0; }
      5%   { opacity: 1; }
      38%  { transform: translateX(400%);  opacity: 1; }
      42%  { opacity: 0; }
      100% { transform: translateX(400%);  opacity: 0; }
    }

    /* 四角装饰括号 */
    .bw-c { position: absolute; width: 16px; height: 16px; pointer-events: none; }
    .bw-c-tl { top: 0; left: 0;
      border-top: 2px solid rgba(212,168,74,.6); border-left: 2px solid rgba(212,168,74,.6); }
    .bw-c-tr { top: 0; right: 0;
      border-top: 2px solid rgba(212,168,74,.6); border-right: 2px solid rgba(212,168,74,.6); }
    .bw-c-bl { bottom: 0; left: 0;
      border-bottom: 2px solid rgba(212,168,74,.6); border-left: 2px solid rgba(212,168,74,.6); }
    .bw-c-br { bottom: 0; right: 0;
      border-bottom: 2px solid rgba(212,168,74,.6); border-right: 2px solid rgba(212,168,74,.6); }

    /* ── Hero 区：logo + 标题 ── */
    .bw-login-hero {
      padding: 2.6rem 2.8rem 2rem;
      text-align: center;
      border-bottom: 1px solid rgba(185,142,52,.12);
      background: linear-gradient(180deg, rgba(212,168,74,.055) 0%, transparent 100%);
      opacity: 0;
      animation: heroIn .6s ease .35s forwards;
    }
    @keyframes heroIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .bw-login-logo-img {
      width: 76px; height: 76px; object-fit: contain;
      margin: 0 auto 1.1rem;
      display: block;
      filter: drop-shadow(0 0 14px rgba(212,168,74,.6)) drop-shadow(0 0 32px rgba(212,168,74,.25));
      opacity: 0; transform: scale(.75);
      animation: logoIn .65s cubic-bezier(.34,1.5,.64,1) .5s forwards;
    }
    @keyframes logoIn {
      to { opacity: 1; transform: scale(1); }
    }
    .bw-login-title {
      font-family: var(--f-main); font-weight: 900; font-size: 1.55rem;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--c-gold-bright);
      text-shadow: 0 0 28px rgba(212,168,74,.55), 0 0 56px rgba(212,168,74,.2);
      opacity: 0;
      animation: fadeUp .5s ease .7s forwards;
    }
    .bw-login-sub {
      font-family: var(--f-main); font-size: .7rem; font-weight: 600;
      letter-spacing: .24em; text-transform: uppercase;
      color: rgba(155,185,220,.38); margin-top: .35rem;
      opacity: 0;
      animation: fadeUp .5s ease .8s forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 表单区 ── */
    .bw-login-body {
      padding: 2.2rem 2.8rem 2.6rem;
      opacity: 0;
      animation: fadeUp .5s ease .9s forwards;
    }

    .bw-field { margin-bottom: 1.3rem; }
    .bw-field label {
      display: block; font-size: .72rem; font-weight: 700;
      color: rgba(155,185,220,.5); margin-bottom: .45rem;
      letter-spacing: .12em; text-transform: uppercase;
    }
    .bw-field input {
      width: 100%; padding: .8rem 1.05rem;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(185,142,52,.2);
      border-radius: 0;
      color: var(--c-white); font-family: var(--f-main); font-size: .96rem;
      transition: border-color .22s, box-shadow .22s, background .22s;
    }
    .bw-field input::placeholder { color: rgba(96,120,152,.38); }
    .bw-field input:focus {
      outline: none;
      border-color: rgba(212,168,74,.62);
      background: rgba(0,0,0,.68);
      box-shadow: 0 0 0 3px rgba(212,168,74,.07), inset 3px 0 0 rgba(212,168,74,.55);
    }

    /* 登录按钮 */
    .bw-login-btn {
      width: 100%; padding: .95rem;
      margin-top: .5rem;
      background: linear-gradient(135deg, rgba(192,148,58,.22) 0%, rgba(140,102,30,.14) 100%);
      border: 1px solid rgba(212,168,74,.55);
      border-radius: 0;
      color: var(--c-gold-bright);
      font-family: var(--f-main); font-weight: 900;
      font-size: .92rem; letter-spacing: .2em; text-transform: uppercase;
      cursor: pointer; position: relative; overflow: hidden;
      transition: background .22s, box-shadow .22s, filter .22s, transform .1s;
    }
    .bw-login-btn::before {
      content: '';
      position: absolute; top: -100%; left: -60%; width: 40%; height: 300%;
      background: linear-gradient(108deg, transparent 30%, rgba(255,215,100,.12) 50%, transparent 70%);
      transition: transform .45s ease;
    }
    .bw-login-btn:hover {
      background: linear-gradient(135deg, rgba(212,168,74,.3) 0%, rgba(175,128,42,.18) 100%);
      box-shadow: 0 0 30px rgba(212,168,74,.3), 0 0 60px rgba(212,168,74,.1);
      filter: drop-shadow(0 0 12px rgba(212,168,74,.4));
    }
    .bw-login-btn:hover::before { transform: translateX(380%); }
    .bw-login-btn:active { transform: scale(.992); }
    .bw-login-btn:disabled { opacity: .5; cursor: default; pointer-events: none; }

    /* 错误 */
    .bw-login-err {
      margin-top: 1rem; padding: .65rem 1rem;
      border: 1px solid rgba(203,74,158,.35);
      background: rgba(203,74,158,.07);
      color: #e8a4cf; font-size: .84rem; line-height: 1.5;
      display: none;
    }
    .bw-login-err.show { display: block; }

    /* 底部 */
    .bw-login-footer {
      margin-top: 1.8rem; text-align: center;
      color: rgba(155,185,220,.28); font-size: .7rem;
      letter-spacing: .06em; line-height: 1.9;
      border-top: 1px solid rgba(185,142,52,.08);
      padding-top: 1.4rem;
    }
    .bw-login-footer b { color: rgba(212,168,74,.38); font-weight: 400; }
  </style>
</head>
<body>
  <canvas id="star-canvas"></canvas>
  <div class="nebula-bg"></div>
  <div class="bw-login-halo"></div>
  <div class="bw-login-scan"></div>
  <div class="bw-login-corner-glow tl"></div>
  <div class="bw-login-corner-glow br"></div>

  <header class="bw-header">
    <div class="bw-header-row">
      <div class="bw-htab bw-brand" style="flex:0 0 auto; padding:0 1.6rem;">
        <img src="picture/WS-logo-2.png" class="bw-brand-logo-img" alt="WS">
        <div class="bw-brand-text">
          <span class="bw-brand-cn">CSC·Alliance</span>
          <span class="bw-brand-sub">BOSS TOOL</span>
        </div>
      </div>
    </div>
  </header>

  <div class="bw-wf-bg" aria-hidden="true"><img src="picture/白色莲纹.svg" alt=""></div>

  <div class="bw-login-page">
    <form class="bw-login-card" id="bw-login-form" autocomplete="on">
      <!-- 角标 -->
      <span class="bw-c bw-c-tl"></span>
      <span class="bw-c bw-c-tr"></span>
      <span class="bw-c bw-c-bl"></span>
      <span class="bw-c bw-c-br"></span>

      <!-- Hero -->
      <div class="bw-login-hero">
        <img src="picture/WS-logo-2.png" class="bw-login-logo-img" alt="CSC Alliance">
        <div class="bw-login-title">Boss Tool</div>
        <div class="bw-login-sub">CSC · Alliance &nbsp;·&nbsp; 内部系统</div>
      </div>

      <!-- 表单 -->
      <div class="bw-login-body">
        <div class="bw-field">
          <label for="bw-email">邮箱</label>
          <input type="email" id="bw-email" name="email" required autocomplete="username" placeholder="your@email.com">
        </div>
        <div class="bw-field">
          <label for="bw-pass">口令</label>
          <input type="password" id="bw-pass" name="password" required autocomplete="current-password" placeholder="••••••••">
        </div>

        <button type="submit" class="bw-login-btn" id="bw-login-btn">进入系统</button>
        <div class="bw-login-err" id="bw-login-err"></div>

        <div class="bw-login-footer">
          <b>◆</b> 与 Warframe.market 账号无关 <b>◆</b><br>
          仅限 CSC·Alliance 白名单成员使用
        </div>
      </div>
    </form>
  </div>

  <script src="js/login.js"></script>
  <script>
    (function () {
      var img = document.querySelector('.bw-wf-bg img');
      if (!img) return;
      function trigger() {
        img.classList.add('glitching');
        setTimeout(function () { img.classList.remove('glitching'); }, 560);
        setTimeout(trigger, 6000 + Math.random() * 9000);
      }
      setTimeout(trigger, 3500 + Math.random() * 4500);
    })();
  </script>
</body>
</html>
