<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>登录 — CSC·Alliance：Boss Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* ── 登录页专属布局 ── */
    .bw-login-wrap {
      min-height: calc(100vh - 84px);
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 2;
      padding: 2rem 1.4rem;
    }

    /* 卡片后面的光晕光圈 */
    .bw-login-glow {
      position: absolute;
      width: 520px; height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(192,148,58,.09) 0%, rgba(192,148,58,.03) 45%, transparent 70%);
      pointer-events: none;
      animation: loginGlowPulse 4s ease-in-out infinite;
    }
    @keyframes loginGlowPulse {
      0%, 100% { transform: scale(1);   opacity: .7; }
      50%       { transform: scale(1.1); opacity: 1; }
    }

    /* 卡片主体 */
    .bw-login-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      background: linear-gradient(160deg, rgba(12,18,38,.92) 0%, rgba(8,13,26,.96) 100%);
      border: 1px solid var(--c-gold-faint);
      border-radius: 16px;
      padding: 2.6rem 2.2rem 2.2rem;
      box-shadow: 0 0 60px rgba(0,0,0,.6), 0 0 0 1px rgba(192,148,58,.04);
      backdrop-filter: blur(12px);
      overflow: hidden;
      opacity: 0; transform: translateY(20px) scale(.98);
      animation: loginCardIn .65s cubic-bezier(.22,.68,0,1.1) .1s forwards;
    }
    @keyframes loginCardIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* 卡片顶部金线 */
    .bw-login-card::before {
      content: '';
      position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--c-gold-bright), transparent);
      opacity: .6;
    }
    /* 扫光动画 */
    .bw-login-card::after {
      content: '';
      position: absolute; top: -100%; left: -60%; width: 40%; height: 300%;
      background: linear-gradient(105deg, transparent 30%, rgba(212,168,74,.06) 50%, transparent 70%);
      animation: loginSweep 5s ease-in-out 1s infinite;
      pointer-events: none;
    }
    @keyframes loginSweep {
      0%   { transform: translateX(-10%); }
      40%  { transform: translateX(300%); }
      100% { transform: translateX(300%); }
    }

    /* 徽标区 */
    .bw-login-badge {
      display: flex; align-items: center; gap: .7rem; margin-bottom: 1.8rem;
    }
    .bw-login-badge-icon {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(192,148,58,.25), rgba(135,98,32,.1));
      border: 1px solid var(--c-gold-dim);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--f-sci); font-size: .9rem; color: var(--c-gold-bright);
      box-shadow: 0 0 12px rgba(192,148,58,.2);
      flex-shrink: 0;
    }
    .bw-login-badge-text {}
    .bw-login-title {
      font-family: var(--f-sci); font-size: 1rem; font-weight: 700;
      color: var(--c-gold-bright); letter-spacing: .05em; line-height: 1.2;
    }
    .bw-login-sub {
      color: var(--c-text2); font-size: .78rem; margin-top: .15rem; line-height: 1.4;
    }

    /* 分割线 */
    .bw-login-divider {
      height: 1px; background: var(--c-gold-faint); margin-bottom: 1.6rem;
    }

    /* 字段 */
    .bw-field { margin-bottom: 1.1rem; }
    .bw-field label {
      display: block; font-size: .78rem; font-weight: 600;
      color: var(--c-text2); margin-bottom: .4rem;
      letter-spacing: .05em; text-transform: uppercase;
    }
    .bw-field-input-wrap { position: relative; }
    .bw-field input {
      width: 100%; padding: .7rem .9rem;
      background: rgba(0,0,0,.4);
      border: 1px solid var(--c-gold-faint);
      border-radius: var(--r-md);
      color: var(--c-white); font-family: var(--f-body); font-size: .98rem;
      transition: border-color .22s ease, box-shadow .22s ease, background .22s ease;
    }
    .bw-field input::placeholder { color: rgba(96,120,152,.5); }
    .bw-field input:focus {
      outline: none; border-color: var(--c-gold-mid);
      background: rgba(0,0,0,.55);
      box-shadow: 0 0 0 3px rgba(212,168,74,.1), 0 0 16px rgba(192,148,58,.08);
    }

    /* 登录按钮 */
    .bw-login-btn {
      width: 100%; padding: .82rem;
      margin-top: .4rem;
      background: linear-gradient(135deg, rgba(192,148,58,.2), rgba(135,98,32,.1));
      border: 1px solid var(--c-gold-mid);
      border-radius: var(--r-md);
      color: var(--c-gold-bright); font-family: var(--f-sci); font-weight: 700;
      font-size: .95rem; letter-spacing: .08em; cursor: pointer;
      position: relative; overflow: hidden;
      transition: background .22s ease, box-shadow .22s ease, transform .12s ease;
    }
    .bw-login-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(212,168,74,.12), transparent);
      opacity: 0; transition: opacity .22s ease;
    }
    .bw-login-btn:hover { box-shadow: 0 0 24px rgba(195,152,52,.3); }
    .bw-login-btn:hover::before { opacity: 1; }
    .bw-login-btn:active { transform: scale(.98); }
    .bw-login-btn:disabled { opacity: .55; cursor: default; pointer-events: none; }

    /* 错误提示 */
    .bw-login-err {
      margin-top: 1rem; padding: .6rem .9rem;
      border-radius: var(--r-md);
      background: rgba(203,74,158,.08); border: 1px solid rgba(203,74,158,.3);
      color: #e8a4cf; font-size: .85rem; line-height: 1.5;
      display: none;
    }
    .bw-login-err.show { display: block; }

    /* 底部说明 */
    .bw-login-footer {
      margin-top: 1.4rem; text-align: center;
      color: var(--c-text2); font-size: .76rem; line-height: 1.6;
    }
    .bw-login-footer span { color: rgba(192,148,58,.5); }
  </style>
</head>
<body>
  <canvas id="star-canvas"></canvas>
  <div class="nebula-bg"></div>

  <header class="bw-header">
    <div class="bw-brand">
      <span class="bw-brand-cn">CSC·Alliance</span>
      <span class="bw-brand-divider"></span>
      <span class="bw-brand-sub">BOSS TOOL</span>
    </div>
  </header>

  <main class="bw-login-wrap">
    <div class="bw-login-glow"></div>
    <form class="bw-login-card" id="bw-login-form" autocomplete="on">
      <div class="bw-login-badge">
        <div class="bw-login-badge-icon">◈</div>
        <div class="bw-login-badge-text">
          <div class="bw-login-title">内部登录验证</div>
          <div class="bw-login-sub">限 CSC·Alliance 白名单账号</div>
        </div>
      </div>
      <div class="bw-login-divider"></div>

      <div class="bw-field">
        <label for="bw-email">邮箱</label>
        <div class="bw-field-input-wrap">
          <input type="email" id="bw-email" name="email" required autocomplete="username" placeholder="your@email.com">
        </div>
      </div>
      <div class="bw-field">
        <label for="bw-pass">口令</label>
        <div class="bw-field-input-wrap">
          <input type="password" id="bw-pass" name="password" required autocomplete="current-password" placeholder="••••••••">
        </div>
      </div>

      <button type="submit" class="bw-login-btn" id="bw-login-btn">登录</button>
      <div class="bw-login-err" id="bw-login-err"></div>

      <div class="bw-login-footer">
        <span>⬡</span> 与 Warframe.market 账号无关 <span>⬡</span>
      </div>
    </form>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
