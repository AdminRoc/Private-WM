<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a2040"/>
      <stop offset="100%" stop-color="#07090f"/>
    </radialGradient>
    <radialGradient id="gold" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f0d070"/>
      <stop offset="55%" stop-color="#d4a84a"/>
      <stop offset="100%" stop-color="#8a5e18"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景圆 -->
  <circle cx="60" cy="60" r="60" fill="url(#bg)"/>
  <!-- 外环 -->
  <circle cx="60" cy="60" r="57" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.7"/>
  <circle cx="60" cy="60" r="53" fill="none" stroke="rgba(212,168,74,0.3)" stroke-width="0.6"/>

  <!-- 五星（顶部弧） -->
  <g fill="url(#gold)" filter="url(#glow)">
    <!-- 中心星 -->
    <polygon points="60,10 62.2,16.8 69.4,16.8 63.6,21 65.8,27.8 60,23.6 54.2,27.8 56.4,21 50.6,16.8 57.8,16.8" transform="scale(0.72) translate(23,8)"/>
    <!-- 左1 -->
    <polygon points="60,10 62.2,16.8 69.4,16.8 63.6,21 65.8,27.8 60,23.6 54.2,27.8 56.4,21 50.6,16.8 57.8,16.8" transform="translate(-26,4) scale(0.62)"/>
    <!-- 右1 -->
    <polygon points="60,10 62.2,16.8 69.4,16.8 63.6,21 65.8,27.8 60,23.6 54.2,27.8 56.4,21 50.6,16.8 57.8,16.8" transform="translate(44,4) scale(0.62)"/>
    <!-- 左2 -->
    <polygon points="60,10 62.2,16.8 69.4,16.8 63.6,21 65.8,27.8 60,23.6 54.2,27.8 56.4,21 50.6,16.8 57.8,16.8" transform="translate(-44,16) scale(0.55)"/>
    <!-- 右2 -->
    <polygon points="60,10 62.2,16.8 69.4,16.8 63.6,21 65.8,27.8 60,23.6 54.2,27.8 56.4,21 50.6,16.8 57.8,16.8" transform="translate(62,16) scale(0.55)"/>
  </g>

  <!-- 交叉工具主体（锤+斧交叉，简化几何） -->
  <g filter="url(#glow)" opacity="0.95">
    <!-- 左斜杆（左上→右下） -->
    <rect x="54" y="30" width="8" height="52" rx="3" fill="url(#gold)" transform="rotate(-38 60 60)"/>
    <!-- 右斜杆（右上→左下） -->
    <rect x="58" y="30" width="8" height="52" rx="3" fill="url(#gold)" transform="rotate(38 60 60)"/>

    <!-- 左杆顶端（锤头） -->
    <rect x="24" y="29" width="22" height="12" rx="3" fill="url(#gold)" transform="rotate(-38 60 60) translate(-18,-6)"/>
    <!-- 右杆顶端（斧刃） -->
    <path d="M88 27 C96 22 100 34 92 38 Z" fill="url(#gold)" transform="rotate(38 60 60) translate(-10,-8)"/>
    <path d="M88 27 C100 24 102 38 92 38 Z" fill="url(#gold)" transform="rotate(38 60 60) translate(-10,-8)" opacity="0.5"/>

    <!-- 中心菱形装饰 -->
    <polygon points="60,48 67,57 60,66 53,57" fill="url(#bg)" stroke="url(#gold)" stroke-width="1.5"/>
    <circle cx="60" cy="57" r="3" fill="url(#gold)"/>
  </g>

  <!-- 底部弧线装饰 -->
  <path d="M 28 88 Q 60 100 92 88" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.5"/>
  <path d="M 33 93 Q 60 104 87 93" fill="none" stroke="url(#gold)" stroke-width="0.7" opacity="0.3"/>
</svg>
