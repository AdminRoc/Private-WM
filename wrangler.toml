name = "privatewm"
main = "src/worker.js"
compatibility_date = "2026-06-01"

# 静态资源（index.html/css/js/picture）直接由 Workers Static Assets 托管，
# /api/* 之外的请求自动 fallback 到这里，无需额外配置路由。
[assets]
directory = "."
binding = "ASSETS"
exclude = ["src/*", "wrangler.toml", "worker-update-snippet.js", ".claude/*"]

# 登录会话存储（白名单校验 + 单会话挤占）。
# KV 命名空间需要在 Cloudflare 控制台/wrangler 创建后把 id 填进来：
#   wrangler kv namespace create "BW_SESSIONS"
[[kv_namespaces]]
binding = "BW_SESSIONS"
id = "28cb991746ea48f9bf409acaeb37d902"

# 账号白名单+各自口令哈希、以及 WM clientId 等敏感配置全部走 Secret，
# 不写入仓库明文。部署前需要在 Cloudflare 控制台 Variables and Secrets
# 设置一个 JSON 类型的 Secret：
#   BW_ACCOUNTS_JSON = { "邮箱(全小写)": "该账号口令的SHA-256哈希", ... }
# 以后新增允许登录的账号，只需要在这一个 JSON 里加一条 key-value，
# 不用碰任何其它配置。
