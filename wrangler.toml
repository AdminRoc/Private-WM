name = "privatewm"
main = "src/worker.js"
compatibility_date = "2026-06-01"

# 静态资源（index.html/css/js/picture）直接由 Workers Static Assets 托管，
# /api/* 之外的请求自动 fallback 到这里，无需额外配置路由。
[assets]
directory = "."
binding = "ASSETS"
exclude = ["src/*", "wrangler.toml", "worker-update-snippet.js", ".claude/*"]

# 登录会话存储（白名单校验 + 单会话挤占）。
# KV 命名空间需要在 Cloudflare 控制台/wrangler 创建后把 id 填进来：
#   wrangler kv namespace create "BW_SESSIONS"
[[kv_namespaces]]
binding = "BW_SESSIONS"
id = "28cb991746ea48f9bf409acaeb37d902"

# Cron Trigger：每小时刷新物品总表 KV 缓存（scheduled handler）
[triggers]
crons = ["0 * * * *"]

# 白名单 + 自定义显示名（明文写在这里，改完推送即可生效）
# 格式：{"WM登录邮箱(全小写)": "页面显示的名字"}
# 新增账号只需加一行 key-value，不需要动其他任何配置。
[vars]
BW_ACCOUNTS_JSON = '{"your-wm-email@example.com": "你的显示名"}'
